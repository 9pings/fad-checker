name: Release

# Auto-release on push to main, but ONLY when package.json's version changed.
# Rationale: releasing on every push would be unusable, and tagging by hand defeats the
# point. The maintainer owns versioning, so the version bump IS the release signal — push a
# bump and the binaries build and publish themselves; push anything else and nothing happens.
on:
  push:
    branches: [main]
  workflow_dispatch:        # manual re-run, same guard applies

permissions:
  contents: write           # needed to create the tag and the release

concurrency:
  group: release
  cancel-in-progress: false # never abort a half-uploaded release

jobs:
  guard:
    name: version changed?
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      release: ${{ steps.v.outputs.release }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }        # tags are the state we compare against
      - id: v
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse -q --verify "refs/tags/v$VERSION" >/dev/null; then
            echo "v$VERSION is already tagged — nothing to release."
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "v$VERSION has no tag yet — releasing."
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: guard
    if: needs.guard.outputs.release == 'true'
    name: build & publish v${{ needs.guard.outputs.version }}
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.guard.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      # ---- gate: never publish a binary from a red tree ----
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: npm }
      - run: npm ci
      - run: npm test

      # ---- build: bun cross-compiles every target from this one runner ----
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - name: build binaries
        run: |
          set -eu
          mkdir -p dist
          build() { bun build fad-checker.js --compile --target="$1" --outfile="dist/$2"; }
          build bun-linux-x64     fad-checker-linux-x64
          build bun-linux-arm64   fad-checker-linux-arm64
          build bun-darwin-x64    fad-checker-macos-x64
          build bun-darwin-arm64  fad-checker-macos-arm64
          build bun-windows-x64   fad-checker-windows-x64.exe
          ls -la dist

      # ---- smoke: the artifact we ship must run, with no network ----
      # Source-via-node passing does not prove the compiled binary works: it has no
      # node_modules, so the retire.js hand-off and the bundled data files are only
      # exercised here.
      - name: smoke-test the linux binary offline
        run: |
          set -eu
          chmod +x dist/fad-checker-linux-x64
          dist/fad-checker-linux-x64 --version
          # --offline makes zero network calls by design; a namespace with no interface
          # proves it rather than trusting the flag. Runners may forbid user namespaces,
          # so fall back to a plain offline run instead of failing the release for it.
          if unshare -rn true 2>/dev/null; then
            unshare -rn dist/fad-checker-linux-x64 -s test/fixtures/monorepo-mixed --offline --no-report
          else
            echo "user namespaces unavailable on this runner — running without one"
            dist/fad-checker-linux-x64 -s test/fixtures/monorepo-mixed --offline --no-report
          fi

      # ---- package: ~100 MB each raw, ~38 MB compressed ----
      - name: compress and checksum
        run: |
          set -eu
          cd dist
          for f in fad-checker-linux-x64 fad-checker-linux-arm64 fad-checker-macos-x64 fad-checker-macos-arm64; do
            chmod +x "$f"; tar -czf "$f-v${VERSION}.tar.gz" "$f"; rm "$f"
          done
          zip -q -9 "fad-checker-windows-x64-v${VERSION}.zip" fad-checker-windows-x64.exe
          rm fad-checker-windows-x64.exe
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: release notes from CHANGELOG
        run: |
          node -e '
            const fs = require("fs");
            const md = fs.readFileSync("CHANGELOG.md", "utf8");
            // Everything under [Unreleased] up to the next version heading.
            const m = md.match(/##\s*\[Unreleased\]\s*([\s\S]*?)(?=\n##\s*\[|$)/);
            const body = (m && m[1].trim()) || "";
            fs.writeFileSync("RELEASE_NOTES.md", body || "_See CHANGELOG.md._");
          '
          head -20 RELEASE_NOTES.md

      # gh is preinstalled on the runner — no third-party action in the release path of a
      # security tool.
      - name: create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${VERSION}" dist/* \
            --title "v${VERSION}" \
            --notes-file RELEASE_NOTES.md \
            --verify-tag=false
